<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confluence Knowledge QNA</title>
    <link rel="icon" href="{{ url_for('static', filename='profile-logo.jpg', v='20260722-5') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='profile-logo.jpg', v='20260722-5') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='20260723-12') }}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="질문 히스토리">
        <div class="brand">
          <img class="brand-mark" src="{{ url_for('static', filename='profile-logo.jpg', v='20260722-5') }}" alt="" />
          <div>
            <h1>Confluence QNA</h1>
            <p>Policy context desk</p>
          </div>
        </div>

        <div class="stats" id="stats">
          <div><strong>-</strong><span>문서</span></div>
          <div><strong>-</strong><span>스페이스</span></div>
          <div><strong>-</strong><span>질문</span></div>
        </div>

        <div class="ops-panel">
          <div class="history-head">
            <h2>운영</h2>
            <button id="refreshStats" type="button" title="상태 새로고침">↻</button>
          </div>
          <div id="adminTokenStatus" class="token-status">관리자 토큰 상태 확인 중</div>
          <input id="adminTokenInput" class="token-input" type="password" placeholder="관리자 토큰" autocomplete="off" />
          <div class="ops-actions">
            <button id="saveTokenButton" type="button">토큰 저장</button>
            <button id="runBatchButton" type="button">배치 수집</button>
            <button id="resetBatchButton" type="button">처음부터 수집</button>
            <button id="diagnosticsButton" type="button">상태 점검</button>
          </div>
          <div class="progress-track" aria-label="수집 진행률">
            <span id="ingestProgressBar"></span>
          </div>
          <div class="progress-detail" id="ingestProgressDetail">진행 정보 없음</div>
          <div class="backup-actions">
            <a class="export-link" id="exportLink" href="/api/export/pages.csv">CSV 백업</a>
            <button id="jsonBackupButton" type="button">문서 백업</button>
            <button id="restoreBackupButton" type="button">백업 복원</button>
            <input id="restoreBackupInput" type="file" accept="application/json,.json" hidden />
          </div>
          <div class="ops-status" id="opsStatus">대기 중</div>
        </div>

        <div class="history-head">
          <h2>질문 히스토리</h2>
          <button id="refreshHistory" type="button" title="새로고침">↻</button>
        </div>
        <input id="historySearchInput" class="token-input" type="search" placeholder="히스토리 검색" autocomplete="off" />
        <div class="history-list" id="historyList"></div>
      </aside>

      <main class="workspace">
        <section class="query-panel">
          <div class="query-head">
            <p class="eyebrow">Knowledge desk</p>
            <h2>정책 근거와 리스크 후보 찾기</h2>
          </div>
          <form id="askForm" class="ask-form">
            <textarea id="questionInput" rows="3" placeholder="예: 현재 환불 정책 프로세스가 정상인가요?"></textarea>
            <div class="search-controls" aria-label="검색 모드">
              <label><input type="radio" name="searchMode" value="balanced" checked /> 균형</label>
              <label><input type="radio" name="searchMode" value="strict" /> 정밀</label>
              <label><input type="radio" name="searchMode" value="broad" /> 넓게</label>
              <label><input type="radio" name="searchMode" value="recent" /> 최신</label>
            </div>
            <div class="quick-prompts" id="quickPrompts">
              <button type="button" data-question="현재 최신 정책 기준으로 정상 운영 중인지 확인해줘">정상 여부</button>
              <button type="button" data-question="이 주제의 최종 결정사항과 근거 문서를 찾아줘">최종 결정</button>
              <button type="button" data-question="관련 정책, 예외, 리스크를 함께 비교해줘">리스크 비교</button>
            </div>
            <div class="form-actions">
              <span class="input-hint">Ctrl+Enter로 질문</span>
              <button id="askButton" type="submit">질문하기</button>
            </div>
          </form>
        </section>

        <section class="result-stack">
          <article class="answer-panel">
            <div class="panel-title">
              <h3>답변 결과</h3>
              <div class="result-actions">
                <span id="resultMeta">대기 중</span>
                <button id="copyAnswerButton" type="button" disabled>복사</button>
                <button id="rerunQuestionButton" type="button" disabled>다시 질문</button>
              </div>
            </div>
            <div id="answerToc" class="answer-toc"></div>
            <div id="searchMetaPanel" class="search-meta-panel"></div>
            <div id="answerOutput" class="answer-output">왼쪽 히스토리를 선택하거나 새 질문을 입력하세요.</div>
            <div id="inlineEvidenceList" class="inline-evidence-list"></div>
          </article>

          <section class="source-panel">
            <div class="panel-title">
              <h3>근거 문서</h3>
              <label class="source-sort">
                <span id="sourceCount">0개</span>
                <select id="sourceSort" aria-label="근거 정렬">
                  <option value="score">관련도</option>
                  <option value="recent">최신순</option>
                  <option value="type">문서유형</option>
                </select>
              </label>
            </div>
            <div id="sourceFilters" class="source-filters"></div>
            <div id="sourceList" class="source-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="{{ url_for('static', filename='app.js', v='20260723-12') }}"></script>
  </body>
</html>
