<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confluence Knowledge QNA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="질문 히스토리">
        <div class="brand">
          <div class="brand-mark">K</div>
          <div>
            <h1>Knowledge QNA</h1>
            <p>Confluence context search</p>
          </div>
        </div>

        <div class="stats" id="stats">
          <div><strong>-</strong><span>문서</span></div>
          <div><strong>-</strong><span>스페이스</span></div>
          <div><strong>-</strong><span>질문</span></div>
        </div>

        <div class="history-head">
          <h2>질문 히스토리</h2>
          <button id="refreshHistory" type="button" title="새로고침">↻</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </aside>

      <main class="workspace">
        <section class="query-panel">
          <div>
            <p class="eyebrow">Policy and decision knowledge base</p>
            <h2>질문을 입력하면 최신 문서, 히스토리, 리스크 후보를 함께 찾습니다.</h2>
          </div>
          <form id="askForm" class="ask-form">
            <textarea id="questionInput" rows="3" placeholder="예: 현재 환불 정책 프로세스가 정상인가요?"></textarea>
            <div class="form-actions">
              <button id="askButton" type="submit">질문하기</button>
            </div>
          </form>
        </section>

        <section class="result-grid">
          <article class="answer-panel">
            <div class="panel-title">
              <h3>답변 결과</h3>
              <span id="resultMeta">대기 중</span>
            </div>
            <div id="answerOutput" class="answer-output">왼쪽 히스토리를 선택하거나 새 질문을 입력하세요.</div>
          </article>

          <aside class="source-panel">
            <div class="panel-title">
              <h3>근거 문서</h3>
              <span id="sourceCount">0개</span>
            </div>
            <div id="sourceList" class="source-list"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
