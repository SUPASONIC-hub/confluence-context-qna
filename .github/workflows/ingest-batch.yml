name: Ingest Confluence Batch

on:
  workflow_dispatch:
    inputs:
      reset:
        description: "Reset saved ingest progress before this run"
        required: false
        default: "false"
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: confluence-ingest-batch
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Run resumable ingest batches
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          RESET_INGEST: ${{ github.event.inputs.reset || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_URL:-}" ]; then
            echo "::error::SERVICE_URL secret is required. Set it to your Render service URL, for example https://YOUR-SERVICE.onrender.com"
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          service_url = os.environ["SERVICE_URL"].rstrip("/")
          admin_token = os.environ.get("ADMIN_TOKEN", "")
          reset_ingest = os.environ.get("RESET_INGEST", "false").lower() == "true"
          parsed_service_url = urllib.parse.urlparse(service_url)
          if parsed_service_url.scheme not in ("http", "https") or not parsed_service_url.netloc:
              print(
                  "::error::SERVICE_URL secret must be a full URL, for example "
                  "https://YOUR-SERVICE.onrender.com"
              )
              sys.exit(1)
          print(f"service_host={parsed_service_url.netloc}")

          url = f"{service_url}/api/ingest/batch"
          headers = {
              "Content-Type": "application/json",
          }
          if admin_token:
              headers["X-Admin-Token"] = admin_token

          last_error = None
          total_processed = 0
          last_remaining = None
          def get_json(path):
              request = urllib.request.Request(f"{service_url}{path}", method="GET")
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def describe_error(error):
              if isinstance(error, urllib.error.HTTPError):
                  body = error.read().decode("utf-8", errors="replace")
                  return f"HTTP {error.code}: {body[:500]}"
              return repr(error)

          try:
              config = get_json("/api/admin/config")
          except Exception as error:
              print(
                  "::error::Could not reach Render admin config endpoint. "
                  f"Check SERVICE_URL and whether the service is running. error={describe_error(error)}"
              )
              sys.exit(1)
          print(f"admin_token_required={config.get('admin_token_required')}")
          if config.get("admin_token_required") and not admin_token:
              print(
                  "::error::Render requires ADMIN_TOKEN, but GitHub secret ADMIN_TOKEN is empty. "
                  "Set the GitHub repository secret to the same value as Render ADMIN_TOKEN."
              )
              sys.exit(1)
          try:
              stats = get_json("/api/stats")
          except Exception as error:
              print(f"::error::Could not read service stats. error={describe_error(error)}")
              sys.exit(1)
          print(f"before page_count={stats.get('page_count')} latest={stats.get('latest_updated')}")

          for batch in range(1, 13):
              data = json.dumps({"batch_size": 20, "reset": reset_ingest and batch == 1}).encode("utf-8")
              request = urllib.request.Request(url, data=data, headers=headers, method="POST")
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(request, timeout=45) as response:
                          body = response.read().decode("utf-8")
                          payload = json.loads(body)
                          print(
                              f"batch={batch} attempt={attempt} "
                              f"status={payload.get('status')} processed={payload.get('processed')} "
                              f"remaining={payload.get('progress', {}).get('remaining')}"
                          )
                          processed = int(payload.get("processed") or 0)
                          total_processed += processed
                          last_remaining = payload.get("progress", {}).get("remaining")
                          stats = get_json("/api/stats")
                          print(f"page_count={stats.get('page_count')} stale={stats.get('stale')}")
                          if payload.get("status") == "completed":
                              sys.exit(0)
                          break
                  except urllib.error.HTTPError as error:
                      body = error.read().decode("utf-8", errors="replace")
                      last_error = f"HTTP {error.code}: {body[:500]}"
                      print(f"batch={batch} attempt={attempt} {last_error}")
                      if error.code == 401:
                          print(
                              "::error::Render rejected ADMIN_TOKEN. "
                              "Set GitHub repository secret ADMIN_TOKEN to the same value as Render ADMIN_TOKEN."
                          )
                          sys.exit(1)
                  except Exception as error:
                      last_error = repr(error)
                      print(f"batch={batch} attempt={attempt} {last_error}")
                  time.sleep(10 * attempt)
              time.sleep(5)

          if total_processed > 0:
              print(
                  "Workflow made progress. The next scheduled run will continue "
                  f"from saved progress. total_processed={total_processed} "
                  f"remaining_spaces={last_remaining}"
              )
              sys.exit(0)

          print(
              "::error::Ingest made no progress in this workflow run. "
              f"total_processed={total_processed} remaining_spaces={last_remaining} "
              f"last_error={last_error}"
          )
          sys.exit(1)
          PY
