name: Ingest Confluence Batch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Run resumable ingest batches
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_URL:-}" ]; then
            echo "SERVICE_URL secret is required"
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          service_url = os.environ["SERVICE_URL"].rstrip("/")
          admin_token = os.environ.get("ADMIN_TOKEN", "")
          if not admin_token:
              print("ADMIN_TOKEN secret is empty. Set it to the same value as Render ADMIN_TOKEN.")
              sys.exit(1)

          url = f"{service_url}/api/ingest/batch"
          headers = {
              "Content-Type": "application/json",
              "X-Admin-Token": admin_token,
          }

          last_error = None
          def get_json(path):
              request = urllib.request.Request(f"{service_url}{path}", method="GET")
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          config = get_json("/api/admin/config")
          print(f"admin_token_required={config.get('admin_token_required')}")
          stats = get_json("/api/stats")
          print(f"before page_count={stats.get('page_count')} latest={stats.get('latest_updated')}")

          for batch in range(1, 10):
              data = json.dumps({"batch_size": 80}).encode("utf-8")
              request = urllib.request.Request(url, data=data, headers=headers, method="POST")
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(request, timeout=45) as response:
                          body = response.read().decode("utf-8")
                          payload = json.loads(body)
                          print(
                              f"batch={batch} attempt={attempt} "
                              f"status={payload.get('status')} processed={payload.get('processed')} "
                              f"remaining={payload.get('progress', {}).get('remaining')}"
                          )
                          stats = get_json("/api/stats")
                          print(f"page_count={stats.get('page_count')} stale={stats.get('stale')}")
                          if payload.get("status") == "completed":
                              sys.exit(0)
                          break
                  except urllib.error.HTTPError as error:
                      body = error.read().decode("utf-8", errors="replace")
                      last_error = f"HTTP {error.code}: {body[:500]}"
                      print(f"batch={batch} attempt={attempt} {last_error}")
                      if error.code == 401:
                          sys.exit(1)
                  except Exception as error:
                      last_error = repr(error)
                      print(f"batch={batch} attempt={attempt} {last_error}")
                  time.sleep(10 * attempt)
              time.sleep(5)

          print(f"Ingest did not complete in this workflow run. Last error: {last_error}")
          sys.exit(1)
          PY
