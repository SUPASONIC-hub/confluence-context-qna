services:
  - type: web
    name: confluence-context-qna
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: CONFLUENCE_BASE_URL
        sync: false
      - key: CONFLUENCE_EMAIL
        sync: false
      - key: CONFLUENCE_API_TOKEN
        sync: false
      - key: CONFLUENCE_PAGE_LIMIT
        value: "0"
      - key: CONFLUENCE_SPACE_KEY
        sync: false
      - key: CONFLUENCE_OFFICIAL_SPACES
        sync: false
      - key: CONFLUENCE_SPACE_WEIGHTS
        sync: false
      - key: CONFLUENCE_DOCUMENT_TYPE_WEIGHTS
        value: "정책:4,매뉴얼:3,결정사항:3,이슈:2"
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: confluence-context-qna-db
          property: connectionString
databases:
  - name: confluence-context-qna-db
    plan: free
